<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWS KORPASGAT - FINAL</title>
    <style>
        body { background: black; color: white; font-family: sans-serif; overflow: hidden; margin: 0; }
        
        /* Slideshow Background */
        .slideshow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 2s ease-in-out; background-size: cover; background-position: center; }
        .slide.active { opacity: 1; }

        .header { text-align: center; color: #ffcc00; font-size: 40px; font-weight: bold; padding: 10px; text-transform: uppercase; text-shadow: 2px 2px 4px black; }
        .clock-container { text-align: center; margin-top: 20px; }
        #jam { font-size: 180px; font-weight: bold; line-height: 1; text-shadow: 4px 4px 10px black; }
        .date-container { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .date-box { background: rgba(0,0,0,0.6); padding: 10px 30px; border-radius: 50px; border: 2px solid #ffcc00; font-size: 24px; font-weight: bold; }
        
        .running-text-container { position: fixed; bottom: 120px; width: 100%; background: rgba(0,0,0,0.8); border-top: 2px solid #ffcc00; border-bottom: 2px solid #ffcc00; padding: 10px 0; }
        #disp-run { font-size: 35px; font-weight: bold; color: white; }
        
        .adzan-container { position: fixed; bottom: 0; width: 100%; display: grid; grid-template-columns: repeat(5, 1fr); background: black; border-top: 2px solid #ffcc00; }
        .adzan-box { text-align: center; padding: 15px; border-right: 1px solid #333; }
        .adzan-box h3 { margin: 0; font-size: 18px; color: #ffcc00; text-transform: uppercase; }
        .adzan-box p { margin: 5px 0 0; font-size: 45px; font-weight: bold; }

        #audio-status { position: fixed; right: 20px; bottom: 150px; background: green; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; display: none; }
        .settings-btn { position: fixed; top: 10px; right: 10px; cursor: pointer; opacity: 0.5; z-index: 10; }
        #panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 20px; border: 2px solid #ffcc00; display: none; z-index: 100; width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ffcc00; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onclick="aktifkanAudio()">

    <div class="settings-btn" onclick="togglePanel()">⚙️</div>

    <!-- Background Slideshow -->
    <div class="slideshow">
        <div class="slide active" style="background-image: url('https://github.com/ayogawa81/JWS.KORPASGAT/raw/refs/heads/main/background1.jpg');"></div>
        <div class="slide" style="background-image: url('https://github.com/ayogawa81/JWS.KORPASGAT/raw/refs/heads/main/background2.jpg');"></div>
    </div>

    <div class="header" id="n-satuan">STAFLOG KORPASGAT</div>

    <div class="clock-container">
        <div id="jam">00:00:00</div>
        <div class="date-container">
            <div class="date-box" id="tgl-masehi">Selasa, 5 Mei 2026</div>
            <div class="date-box" style="color: #ffcc00;" id="tgl-hijriah">18 Zulkaidah 1447 H</div>
        </div>
    </div>

    <div id="audio-status">● AUDIO SIAP (KOMANDO)</div>

    <div class="running-text-container">
        <marquee id="disp-run" scrollamount="7"></marquee>
    </div>

    <div class="adzan-container">
        <div class="adzan-box"><h3>Subuh</h3><p id="t-subuh">04:31</p></div>
        <div class="adzan-box"><h3>Dzuhur</h3><p id="t-dzuhur">11:47</p></div>
        <div class="adzan-box"><h3>Ashar</h3><p id="t-ashar">15:08</p></div>
        <div class="adzan-box"><h3>Maghrib</h3><p id="t-maghrib">17:43</p></div>
        <div class="adzan-box"><h3>Isya</h3><p id="t-isya">18:54</p></div>
    </div>

    <div id="panel">
        <h3 style="color:#ffcc00; margin-top:0;">PENGATURAN</h3>
        <label>Nama Satuan:</label>
        <input type="text" id="in-nama">
        <label>Running Text:</label>
        <input type="text" id="in-run">
        <button onclick="saveData()">SIMPAN & REFRESH</button>
        <button onclick="togglePanel()" style="background:#444; color:white; margin-top:5px;">BATAL</button>
    </div>

    <audio id="mainPlayer"></audio>

    <script>
        const player = document.getElementById('mainPlayer');
        const elMarquee = document.getElementById('disp-run');
        let audioReady = false;

        // 1. SLIDESHOW LOGIC
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(nextSlide, 10000);

        // 2. JAM & TANGGAL
        function updateWaktu() {
            const now = new Date();
            document.getElementById('jam').innerText = now.getHours().toString().padStart(2, '0') + ":" + 
                                                        now.getMinutes().toString().padStart(2, '0') + ":" + 
                                                        now.getSeconds().toString().padStart(2, '0');
            
            const hari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const bulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('tgl-masehi').innerText = hari[now.getDay()] + ", " + now.getDate() + " " + bulan[now.getMonth()] + " " + now.getFullYear();
        }

        // 3. AUDIO UNLOCK
        function aktifkanAudio() {
            if(!audioReady) {
                audioReady = true;
                player.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
                player.play();
                document.getElementById('audio-status').style.display = "block";
            }
        }

        // 4. STARTUP
        window.onload = function() {
            updateWaktu();
            setInterval(updateWaktu, 1000);

            const nSat = localStorage.getItem('nSatuan') || "STAFLOG KORPASGAT";
            const teks = localStorage.getItem('tJalan') || "STAF LOG KORPASGAT, KOMANDO!";
            
            document.getElementById('n-satuan').innerText = nSat;
            document.getElementById('in-nama').value = nSat;
            document.getElementById('in-run').value = teks;

            if (elMarquee) {
                elMarquee.innerText = teks;
                elMarquee.removeAttribute('loop'); 
                elMarquee.start();
            }
        };

        function togglePanel() {
            const p = document.getElementById("panel");
            p.style.display = (p.style.display === "block") ? "none" : "block";
        }

        function saveData() {
            localStorage.setItem('nSatuan', document.getElementById('in-nama').value);
            localStorage.setItem('tJalan', document.getElementById('in-run').value);
            location.reload(); 
        }
    </script>
</body>
</html>
