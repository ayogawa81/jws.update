<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWS KORPASGAT V32 - RESTORED OLD VERSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Michroma&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #fbbf24; --active: #ef4444; }
        
        body { 
            margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; cursor: pointer;
        }

        #bg-slideshow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .slide { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 2s; }
        .slide.active { opacity: 1; }
        .overlay { position: absolute; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; }

        .header { padding: 10px; text-align: center; background: rgba(0,0,0,0.8); border-bottom: 4px solid var(--accent); z-index: 2; }
        #n-satuan { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; }

        #container-utama { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; }
        
        /* RESTORED: JAM HIJAU NEON ASLI */
        #jam { 
            font-family: 'Michroma', sans-serif; font-size: 11rem; font-weight: bold;
            color: #39ff14 !important; filter: drop-shadow(0 0 8px #39ff14);
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); margin: 0;
        }

        /* AUTO COUNTDOWN BOX (Hanya muncul saat dibutuhkan) */
        #countdown-box {
            font-size: 2.8rem; color: #ffffff; padding: 10px 50px; border-radius: 15px;
            border: 3px solid #fff; margin-top: -10px; display: none; font-weight: bold; text-align: center;
        }
        .bg-azan { background: rgba(239, 68, 68, 0.85); animation: pulse 1s infinite; }
        .bg-iqomah { background: rgba(30, 58, 138, 0.85); border-color: #39ff14 !important; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* RESTORED: JADWAL SALAT LAYOUT */
        .prayer-row { display: flex; background: rgba(0,0,0,0.9); border-top: 4px solid var(--accent); z-index: 2; }
        .card { flex: 1; padding: 20px 10px; text-align: center; border-right: 1px solid #333; }
        .card h3 { margin: 0; font-size: 1.3rem; color: var(--accent); text-transform: uppercase; }
        .card p { margin: 5px 0 0; font-size: 3.5rem; font-weight: 900; }

        marquee { background: #000; color: var(--accent); font-size: 2.5rem; font-weight: bold; padding: 10px 0; border-top: 4px solid var(--accent); z-index: 2; }
        
        #panel { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 85%; background: #f4f4f4; color: #333; padding: 25px; border-radius: 15px; z-index: 1000; overflow-y: auto; }
        input { width: 92%; padding: 12px; margin: 8px 0; }
        .btn-save { background: #1e3a8a; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body onclick="aktifkanAudio()">
    
    <div id="modal-azan" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
        <h1 style="font-size:6rem; color:#fbbf24; margin:0;">ADZAN BERKUMANDANG</h1>
        <h2 id="azan-name" style="font-size:10rem; color:#fff; margin:0; text-transform:uppercase;">...</h2>
    </div>

    <div id="bg-slideshow">
        <div class="overlay"></div>
        <div class="slide active" style="background-image: url('bg1.jpg')"></div>
        <div class="slide" style="background-image: url('bg2.jpg')"></div>
        <div class="slide" style="background-image: url('bg3.jpg')"></div>
    </div>
    
    <audio id="mainPlayer" preload="auto"></audio>

    <div style="position:fixed; top:20px; right:20px; font-size:35px; z-index:100;" onclick="togglePanel()">⚙️</div>
    
    <div class="header"><h1 id="n-satuan">STAFLOG KORPASGAT</h1></div>

    <div id="container-utama">
        <div id="jam">00:00:00</div>
        <div id="countdown-box">...</div>
    </div>

    <div class="prayer-row">
        <div class="card"><h3>SUBUH</h3><p id="t-subuh">04:31</p></div>
        <div class="card"><h3>DZUHUR</h3><p id="t-dzuhur">11:47</p></div>
        <div class="card"><h3>ASHAR</h3><p id="t-ashar">15:08</p></div>
        <div class="card"><h3>MAGHRIB</h3><p id="t-maghrib">17:43</p></div>
        <div class="card"><h3>ISYA</h3><p id="t-isya">18:54</p></div>
    </div>

    <marquee id="disp-run">Salatlah tepat pada waktunya...</marquee>

    <div id="panel">
        <h2 style="text-align:center;">⚙️ SETTING JWS</h2>
        Nama Satuan: <input type="text" id="in-nama">
        Jeda Iqomah (Menit): <input type="number" id="in-iqo">
        Running Text: <input type="text" id="in-run">
        <button class="btn-save" onclick="saveData()">SIMPAN & REFRESH</button>
        <p onclick="togglePanel()" style="text-align:center; cursor:pointer;">[ TUTUP ]</p>
    </div>

    <script>
        let audioReady = false;
        let sudahBunyi = "";
        let isIqomah = false;
        let iqomahTime = 0;
        const player = document.getElementById('mainPlayer');
        const baseURL = "https://github.com/ayogawa81/JWS.KORPASGAT/raw/refs/heads/main/";

        // LISTENER: OTOMATIS IQOMAH SAAT AUDIO SELESAI
        player.onended = function() {
            document.getElementById('modal-azan').style.display = "none";
            startIqomah();
        };

        function updateWaktu() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const hm = h + ":" + m;
            document.getElementById('jam').innerText = `${h}:${m}:${s}`;
            
            if (isIqomah) { prosesIqomah(); } 
            else { cekJadwal(now, hm); }
        }

        function cekJadwal(now, hm) {
            const jadwal = ["subuh", "dzuhur", "ashar", "maghrib", "isya"];
            let cdBox = document.getElementById('countdown-box');
            let found = false;

            jadwal.forEach(waktu => {
                const targetStr = document.getElementById('t-' + waktu).innerText;
                const [tH, tM] = targetStr.split(':').map(Number);
                const tDate = new Date(); tDate.setHours(tH, tM, 0);
                const diff = (tDate - now) / 1000;

                if (hm === targetStr && sudahBunyi !== waktu) {
                    mulaiAzan(waktu);
                } else if (diff > 0 && diff <= 600) {
                    const mS = Math.floor(diff/60); const sS = Math.floor(diff%60);
                    cdBox.style.display = "block"; cdBox.className = "bg-azan";
                    cdBox.innerText = `MENUJU ${waktu.toUpperCase()}: ${String(mS).padStart(2,'0')}:${String(sS).padStart(2,'0')}`;
                    found = true;
                }
            });
            if (!found && !isIqomah) cdBox.style.display = "none";
        }

        function mulaiAzan(w) {
            sudahBunyi = w;
            document.getElementById('azan-name').innerText = w;
            document.getElementById('modal-azan').style.display = "flex";
            if(audioReady) {
                let f = (w === "subuh") ? "subuh.mp3" : (w === "dzuhur" || w === "maghrib") ? "Azansupri.mp3" : (w === "ashar") ? "AdzanMalaysia.mp3" : "Isya.mp3";
                player.src = baseURL + f;
                player.play().catch(() => { setTimeout(tutupAuto, 5000); });
            } else { setTimeout(tutupAuto, 10000); }
        }

        function tutupAuto() { document.getElementById('modal-azan').style.display = "none"; startIqomah(); }

        function startIqomah() {
            isIqomah = true;
            iqomahTime = (parseInt(localStorage.getItem('jedaIqo')) || 10) * 60;
            document.getElementById('countdown-box').style.display = "block";
            document.getElementById('countdown-box').className = "bg-iqomah";
        }

        function prosesIqomah() {
            if (iqomahTime > 0) {
                iqomahTime--;
                const mI = Math.floor(iqomahTime/60); const sI = iqomahTime%60;
                document.getElementById('countdown-box').innerText = `IQOMAH: ${String(mI).padStart(2,'0')}:${String(sI).padStart(2,'0')}`;
            } else {
                document.getElementById('countdown-box').innerText = "WAKTUNYA SALAT";
                setTimeout(() => { isIqomah = false; sudahBunyi = ""; document.getElementById('countdown-box').style.display = "none"; }, 15000);
            }
        }

        function muatData() {
            document.getElementById('n-satuan').innerText = localStorage.getItem('nSatuan') || "STAFLOG KORPASGAT";
            document.getElementById('in-nama').value = localStorage.getItem('nSatuan') || "";
            document.getElementById('in-iqo').value = localStorage.getItem('jedaIqo') || "10";
            document.getElementById('disp-run').innerText = localStorage.getItem('tJalan') || "Salatlah tepat pada waktunya...";
            document.getElementById('in-run').value = localStorage.getItem('tJalan') || "";
        }

        function saveData() {
            localStorage.setItem('nSatuan', document.getElementById('in-nama').value);
            localStorage.setItem('jedaIqo', document.getElementById('in-iqo').value);
            localStorage.setItem('tJalan', document.getElementById('in-run').value);
            location.reload();
        }

        function togglePanel() { const p = document.getElementById("panel"); p.style.display = (p.style.display === "block") ? "none" : "block"; }
        function aktifkanAudio() { audioReady = true; player.play().catch(()=>{}); }
        
        setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            let cur = 0;
            slides.forEach((s, i) => { if(s.classList.contains('active')) cur = i; });
            slides[cur].classList.remove('active');
            slides[(cur + 1) % slides.length].classList.add('active');
        }, 10000);

        window.onload = () => { muatData(); updateWaktu(); setInterval(updateWaktu, 1000); };
    </script>
</body>
</html>
